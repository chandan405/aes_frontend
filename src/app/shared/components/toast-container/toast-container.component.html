<div class="fixed top-4 right-4 z-[9999] flex flex-col gap-3 max-w-sm w-full pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="pointer-events-auto flex items-start gap-3 px-4 py-3 rounded-xl shadow-lg border
             animate-slide-in-right backdrop-blur-md"
      [ngClass]="{
        'bg-green-900/90 border-green-500/50 text-green-100': toast.type === 'success',
        'bg-red-900/90 border-red-500/50 text-red-100': toast.type === 'error',
        'bg-yellow-900/90 border-yellow-500/50 text-yellow-100': toast.type === 'warning',
        'bg-blue-900/90 border-blue-500/50 text-blue-100': toast.type === 'info'
      }"
    >
      <span class="text-lg mt-0.5">{{ getIcon(toast) }}</span>
      <p class="flex-1 text-sm font-medium">{{ toast.message }}</p>
      <button
        (click)="toastService.remove(toast.id)"
        class="opacity-60 hover:opacity-100 transition-opacity ml-2 flex-shrink-0"
        aria-label="Close notification"
      >✕</button>
    </div>
  }
</div>
