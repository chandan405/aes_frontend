<div class="content p-6 max-w-7xl mx-auto space-y-6">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-4">
        <div>
            <h2 class="text-2xl font-extrabold text-slate-900">Manage Category</h2>
            <p class="text-sm text-slate-500">Add, edit, or remove menu categories.</p>
        </div>
    </div>
    
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Left: Form -->
        <div class="rounded-3xl bg-white border border-slate-100 p-6 shadow-sm">
            <h3 class="text-lg font-bold text-slate-900 mb-4">{{ categoryObj.id ? 'Edit Category' : 'Add Category' }}</h3>
            <form #categoryForm="ngForm" (ngSubmit)="handleSubmit()" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Category Name</label>
                    <input type="text" class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm text-slate-900 focus:border-amber-500 focus:outline-none" name="name" 
                        [(ngModel)]="categoryObj.name" required placeholder="e.g. Beverages">
                </div>
                <div class="space-y-2">
                    <button type="submit" class="w-full inline-flex items-center justify-center rounded-2xl bg-amber-500 px-5 py-3 text-xs font-bold uppercase tracking-wider text-slate-950 shadow-lg shadow-amber-500/10 transition hover:bg-amber-400 hover:shadow-xl active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed" [disabled]="categoryForm.invalid || submitted">
                        {{ submitted ? (categoryObj.id ? 'Updating...' : 'Adding...') : (categoryObj.id ? 'Save Changes' : 'Submit') }}
                    </button>
                    <button type="button" class="w-full inline-flex items-center justify-center rounded-2xl border border-slate-200 bg-white px-5 py-3 text-xs font-bold uppercase tracking-wider text-slate-600 transition hover:bg-slate-50 active:scale-95" (click)="resetForm()" *ngIf="categoryObj.id">
                        Cancel Edit
                    </button>
                </div>
            </form>
        </div>
        
        <!-- Right: List -->
        <div class="lg:col-span-2 rounded-3xl bg-white border border-slate-100 p-6 shadow-sm">
            <h3 class="text-lg font-bold text-slate-900 mb-4">Category List</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-slate-700">
                    <thead>
                        <tr class="border-b border-slate-100 text-xs font-bold uppercase tracking-wider text-slate-400">
                            <th class="pb-3 pr-4 font-semibold">ID</th>
                            <th class="pb-3 pr-4 font-semibold">Category Name</th>
                            <th class="pb-3 pr-4 font-semibold text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        <tr *ngFor="let category of tableData; let i = index" class="group transition duration-150 hover:bg-slate-50/50">
                            <td class="py-4 pr-4 font-bold text-slate-900">{{ i + 1 }}</td>
                            <td class="py-4 pr-4 font-medium">{{ category.name }}</td>
                            <td class="py-4 pr-4 text-right space-x-2">
                                <button class="inline-flex items-center gap-1 rounded-xl border border-slate-200 bg-white px-3 py-1.5 text-xs font-semibold text-slate-600 transition hover:bg-slate-50 hover:text-slate-900" (click)="editCategory(category)">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="h-3.5 w-3.5">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.83 20.04a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
                                    </svg>
                                    Edit
                                </button>
                                <button class="inline-flex items-center gap-1 rounded-xl border border-rose-100 bg-rose-50 px-3 py-1.5 text-xs font-semibold text-rose-600 transition hover:bg-rose-100/50" (click)="deleteCategory(category.id)">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="h-3.5 w-3.5">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                                    </svg>
                                    Delete
                                </button>
                            </td>
                        </tr>
                        <tr *ngIf="tableData.length === 0">
                            <td colspan="3" class="py-8 text-center text-slate-400 text-sm">No categories found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
