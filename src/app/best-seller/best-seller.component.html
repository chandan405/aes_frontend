<div class="space-y-12">
  <!-- Category Selector Tabs -->
  <div class="flex flex-wrap items-center justify-center gap-2">
    <button *ngFor="let cat of categories" (click)="setCategory(cat.id)" [class.bg-slate-900]="selectedCategory === cat.id" [class.text-white]="selectedCategory === cat.id" [class.shadow-md]="selectedCategory === cat.id" [class.shadow-slate-900/10]="selectedCategory === cat.id" [class.bg-white]="selectedCategory !== cat.id" [class.text-slate-600]="selectedCategory !== cat.id" [class.border-slate-200]="selectedCategory !== cat.id" [class.hover:bg-slate-50]="selectedCategory !== cat.id" class="rounded-full border px-6 py-2.5 text-xs font-bold uppercase tracking-wider transition-all duration-200 active:scale-95">
      {{ cat.name }}
    </button>
  </div>

  <!-- Menu Grid -->
  <div class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3">
    <article *ngFor="let item of filteredItems" class="group overflow-hidden rounded-3xl bg-white border border-slate-100 shadow-sm transition-all duration-300 hover:-translate-y-1.5 hover:shadow-xl">
      <!-- Image Wrapper with Price Badge -->
      <div class="relative overflow-hidden h-64">
        <img class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105" [src]="item.image" [alt]="item.name" />
        <div class="absolute inset-0 bg-gradient-to-t from-slate-950/20 to-transparent"></div>
        <span class="absolute top-4 right-4 rounded-full bg-slate-950/80 px-4 py-1.5 text-xs font-bold text-amber-400 backdrop-blur-md">
          {{ item.price }}
        </span>
      </div>

      <!-- Card Details -->
      <div class="p-6 space-y-4">
        <div class="flex items-center justify-between">
          <span class="text-[10px] font-bold uppercase tracking-widest text-amber-600">{{ item.category }}</span>
          <!-- Star Rating -->
          <div class="flex items-center gap-1 text-amber-500">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-3.5 w-3.5">
              <path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.006 5.404.434c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.434 2.082-5.005Z" clip-rule="evenodd" />
            </svg>
            <span class="text-xs font-bold text-slate-700">{{ item.rating }}</span>
          </div>
        </div>

        <h3 class="text-xl font-bold text-slate-900 group-hover:text-amber-600 transition-colors duration-200">{{ item.name }}</h3>
        
        <p class="text-xs leading-relaxed text-slate-500 line-clamp-2">
          {{ item.description }}
        </p>

        <!-- CTA Order Button -->
        <div class="pt-2">
          <button (click)="addToOrder(item.name)" class="flex w-full items-center justify-center gap-2 rounded-xl bg-slate-900 py-3 text-xs font-bold uppercase tracking-wider text-white transition hover:bg-amber-500 hover:text-slate-950 active:scale-98">
            Add to order
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="h-3.5 w-3.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
          </button>
        </div>
      </div>
    </article>
  </div>
</div>
