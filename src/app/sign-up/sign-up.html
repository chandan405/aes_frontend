<!-- Modal Backdrop -->
<div (click)="closeModal()" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-sm animate-in fade-in duration-300">
  
  <!-- Modal Card -->
  <div (click)="$event.stopPropagation()" class="w-full max-w-md rounded-3xl bg-white p-8 shadow-2xl relative border border-slate-100/80 animate-in fade-in zoom-in-95 duration-250">
    
    <!-- Close Button -->
    <button (click)="closeModal()" class="absolute top-5 right-5 text-slate-400 hover:text-slate-600 transition duration-150 p-1.5 rounded-lg hover:bg-slate-50">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <!-- Header Branding -->
    <div class="mb-8 text-center">
      <div class="inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-amber-500 text-slate-950 font-black text-2xl shadow-lg shadow-amber-500/20 mb-3">☕</div>
      <h2 class="text-2xl font-bold tracking-tight text-slate-900">
        {{ userService.authModalTab() === 'forgot' ? 'Reset Password' : 'Aura Cafe' }}
      </h2>
      <p class="text-xs font-semibold text-slate-400 mt-1 uppercase tracking-wider">
        {{ userService.authModalTab() === 'forgot' ? 'Recover your account' : 'Premium Access' }}
      </p>
    </div>

    <!-- Dual Tab Selector -->
    <div *ngIf="userService.authModalTab() !== 'forgot'" class="grid grid-cols-2 gap-1.5 rounded-2xl bg-slate-50 p-1.5 mb-6">
      <button type="button" (click)="setTab('login')" 
              [class.bg-white]="userService.authModalTab() === 'login'"
              [class.text-slate-900]="userService.authModalTab() === 'login'"
              [class.shadow-sm]="userService.authModalTab() === 'login'"
              [class.text-slate-500]="userService.authModalTab() !== 'login'"
              class="rounded-xl py-2.5 text-xs font-bold uppercase tracking-wider transition-all duration-200">
        Sign In
      </button>
      <button type="button" (click)="setTab('signup')" 
              [class.bg-white]="userService.authModalTab() === 'signup'"
              [class.text-slate-900]="userService.authModalTab() === 'signup'"
              [class.shadow-sm]="userService.authModalTab() === 'signup'"
              [class.text-slate-500]="userService.authModalTab() !== 'signup'"
              class="rounded-xl py-2.5 text-xs font-bold uppercase tracking-wider transition-all duration-200">
        Register
      </button>
    </div>

    <!-- Forms -->
    <form (ngSubmit)="onSubmit()" [formGroup]="authForm" class="space-y-4">
      <!-- Full Name (Sign-up only) -->
      <div *ngIf="userService.authModalTab() === 'signup'" class="space-y-1">
        <label for="name" class="text-xs font-bold text-slate-600 uppercase tracking-wider">Full Name</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5">
            <svg class="h-4.5 w-4.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
            </svg>
          </span>
          <input type="text" id="name" formControlName="name" placeholder="Enter your full name"
                 class="h-11 w-full rounded-xl border border-slate-200 bg-slate-50 pl-11 pr-4 text-sm text-slate-800 placeholder-slate-400 outline-none transition duration-200 focus:border-amber-500 focus:bg-white focus:ring-2 focus:ring-amber-500/20" />
        </div>
      </div>

      <!-- Contact Number (Sign-up only) -->
      <div *ngIf="userService.authModalTab() === 'signup'" class="space-y-1">
        <label for="contactNumber" class="text-xs font-bold text-slate-600 uppercase tracking-wider">Contact Number</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5">
            <svg class="h-4.5 w-4.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-2.824-1.802-5.122-4.1-6.924-6.924l1.293-.97a1.125 1.125 0 0 0 .417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z" />
            </svg>
          </span>
          <input type="tel" id="contactNumber" formControlName="contactNumber" placeholder="Enter your contact number"
                 class="h-11 w-full rounded-xl border border-slate-200 bg-slate-50 pl-11 pr-4 text-sm text-slate-800 placeholder-slate-400 outline-none transition duration-200 focus:border-amber-500 focus:bg-white focus:ring-2 focus:ring-amber-500/20" />
        </div>
      </div>

      <!-- Email (Both) -->
      <div class="space-y-1">
        <label for="email" class="text-xs font-bold text-slate-600 uppercase tracking-wider">Email Address</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5">
            <svg class="h-4.5 w-4.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0l-7.5-4.615a2.25 2.25 0 01-1.07-1.916V6.75" />
            </svg>
          </span>
          <input type="email" id="email" formControlName="email" placeholder="name@example.com"
                 class="h-11 w-full rounded-xl border border-slate-200 bg-slate-50 pl-11 pr-4 text-sm text-slate-800 placeholder-slate-400 outline-none transition duration-200 focus:border-amber-500 focus:bg-white focus:ring-2 focus:ring-amber-500/20" />
        </div>
      </div>

      <!-- Password (Login/Signup only) -->
      <div *ngIf="userService.authModalTab() !== 'forgot'" class="space-y-1">
        <div class="flex items-center justify-between">
          <label for="password" class="text-xs font-bold text-slate-600 uppercase tracking-wider">Password</label>
          <!-- Forgot Password Link (Login only) -->
          <button *ngIf="userService.authModalTab() === 'login'" type="button" (click)="setTab('forgot')" class="text-xs font-bold text-amber-600 hover:underline">
            Forgot Password?
          </button>
        </div>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5">
            <svg class="h-4.5 w-4.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
          </span>
          <input type="password" id="password" formControlName="password" placeholder="••••••••"
                 class="h-11 w-full rounded-xl border border-slate-200 bg-slate-50 pl-11 pr-4 text-sm text-slate-800 placeholder-slate-400 outline-none transition duration-200 focus:border-amber-500 focus:bg-white focus:ring-2 focus:ring-amber-500/20" />
        </div>
      </div>

      <!-- Confirm Password (Sign-up only) -->
      <div *ngIf="userService.authModalTab() === 'signup'" class="space-y-1">
        <label for="confirmPassword" class="text-xs font-bold text-slate-600 uppercase tracking-wider">Confirm Password</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5">
            <svg class="h-4.5 w-4.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
          </span>
          <input type="password" id="confirmPassword" formControlName="confirmPassword" placeholder="••••••••"
                 class="h-11 w-full rounded-xl border border-slate-200 bg-slate-50 pl-11 pr-4 text-sm text-slate-800 placeholder-slate-400 outline-none transition duration-200 focus:border-amber-500 focus:bg-white focus:ring-2 focus:ring-amber-500/20" />
        </div>
      </div>

      <!-- Submit Button -->
      <div class="pt-4">
        <button type="submit" [disabled]="loading()" 
                class="flex w-full h-12 items-center justify-center gap-2 rounded-xl bg-slate-900 text-xs font-bold uppercase tracking-wider text-white transition hover:bg-amber-500 hover:text-slate-950 active:scale-98 disabled:opacity-60 disabled:pointer-events-none">
          <svg *ngIf="loading()" class="animate-spin h-4 w-4 text-current" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span *ngIf="loading()">Processing...</span>
          <span *ngIf="!loading() && userService.authModalTab() === 'login'">Sign In</span>
          <span *ngIf="!loading() && userService.authModalTab() === 'signup'">Create Account</span>
          <span *ngIf="!loading() && userService.authModalTab() === 'forgot'">Send Reset Link</span>
        </button>
      </div>
    </form>

    <!-- Switch Tab Footer Helper -->
    <div class="mt-6 text-center text-xs text-slate-500">
      <span *ngIf="userService.authModalTab() === 'login'">
        Don't have an account? 
        <button type="button" (click)="setTab('signup')" class="font-bold text-amber-600 hover:underline">Register now</button>
      </span>
      <span *ngIf="userService.authModalTab() === 'signup'">
        Already have an account? 
        <button type="button" (click)="setTab('login')" class="font-bold text-amber-600 hover:underline">Sign in instead</button>
      </span>
      <span *ngIf="userService.authModalTab() === 'forgot'">
        Remembered your password? 
        <button type="button" (click)="setTab('login')" class="font-bold text-amber-600 hover:underline">Sign in</button>
      </span>
    </div>

  </div>
</div>
